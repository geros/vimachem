server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Party.API
    location /api/parties {
        proxy_pass http://party-api:8080/api/parties;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Catalog.API - Books
    location /api/catalog/books {
        proxy_pass http://catalog-api:8080/api/catalog/books;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Catalog.API - Categories
    location /api/catalog/categories {
        proxy_pass http://catalog-api:8080/api/catalog/categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Lending.API
    location /api/lending {
        proxy_pass http://lending-api:8080/api/lending;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Audit.API
    location /api/events {
        proxy_pass http://audit-api:8080/api/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
